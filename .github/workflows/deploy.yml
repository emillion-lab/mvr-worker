name: Deploy Worker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify token & resolve account ID
        run: |
          echo "Token verify:"
          curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            https://api.cloudflare.com/client/v4/user/tokens/verify
          echo ""
          ACC=$(curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            https://api.cloudflare.com/client/v4/accounts \
            | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('result') or []; print(r[0]['id'] if r else '')")
          echo "Account ID resolved: ${ACC:0:6}…"
          echo "CF_ACCOUNT_ID=$ACC" >> $GITHUB_ENV

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}

      - name: Verify deployed version
        run: |
          sleep 5
          curl -s https://mvr-proxy.mihov-emil.workers.dev/health
