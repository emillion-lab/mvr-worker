name: Set TomTom Key
# Взима ключа от GitHub secret (маскиран в логовете) и го записва
# като Worker secret в Cloudflare. Ключът НИКОГА не влиза в repo-то.
#
# Преди да пуснеш:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Name: TOMTOM_KEY    Value: <ключа от TomTom>
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  set-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Upload secret to Worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TT: ${{ secrets.TOMTOM_KEY }}
        run: |
          R="tomtom-report.txt"
          echo "== Set TomTom key $(date -u) ==" > $R
          if [ -z "$TT" ]; then
            echo "ГРЕШКА: GitHub secret TOMTOM_KEY не е зададен." >> $R
            echo "Settings -> Secrets and variables -> Actions -> New repository secret" >> $R
            cat $R; exit 1
          fi
          ACC="74820d71c551391ce31d309c2fcb091c"
          echo "--- upload secret ---" >> $R
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$ACC/workers/scripts/mvr-proxy/secrets" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data "$(python3 -c "
import json,os
print(json.dumps({'name':'TOMTOM_KEY','text':os.environ['TT'],'type':'secret_text'}))
")" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps({'success':d.get('success'),'errors':d.get('errors')}))" >> $R
          echo "" >> $R
          echo "--- тест на /traffic (Цариградско) ---" >> $R
          sleep 5
          curl -s "https://mvr-proxy.mihov-emil.workers.dev/traffic?pts=42.6752,23.3587" | head -c 400 >> $R
          echo "" >> $R
          cat $R
          git config user.name "ci"; git config user.email "ci@fish.taxi"
          git add $R
          git commit -m "tomtom key report [skip ci]" || true
          git push
