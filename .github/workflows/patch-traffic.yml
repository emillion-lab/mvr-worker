name: patch-traffic
on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_traffic.py'
      - 'patch_traffic_kv.py'
      - 'patch_traffic_d1.py'
      - '.github/workflows/patch-traffic.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: /traffic ендпойнт
        run: python3 patch_traffic.py > /tmp/r1.txt 2>&1 || true
      - name: KV четене
        run: python3 patch_traffic_kv.py > /tmp/r2.txt 2>&1 || true
      - name: D1 четене
        run: python3 patch_traffic_d1.py > /tmp/r3.txt 2>&1 || true
      - name: Отчет
        run: |
          cat /tmp/r1.txt /tmp/r2.txt /tmp/r3.txt > traffic-patch-report.txt
          node --check src/worker.js && echo "SYNTAX OK" >> traffic-patch-report.txt
          cat traffic-patch-report.txt
      - name: Commit
        run: |
          git config user.name traffic-bot; git config user.email traffic@mvr
          git add src/worker.js traffic-patch-report.txt
          git diff --cached --quiet || (git commit -m "worker: /traffic + D1 ключ" && git push)
