name: patch-traffic
on:
  workflow_dispatch:
  push:
    paths:
      - 'patch_traffic.py'
      - 'patch_traffic_kv.py'
      - '.github/workflows/patch-traffic.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply /traffic endpoint
        run: python3 patch_traffic.py | tee traffic-patch-report.txt
      - name: Apply KV key lookup
        run: python3 patch_traffic_kv.py | tee -a traffic-patch-report.txt
      - name: Syntax check
        run: node --check src/worker.js && echo "SYNTAX OK" >> traffic-patch-report.txt
      - name: Commit
        run: |
          git config user.name traffic-bot; git config user.email traffic@mvr
          git add src/worker.js traffic-patch-report.txt
          git diff --cached --quiet || (git commit -m "worker: /traffic + KV ключ" && git push)
