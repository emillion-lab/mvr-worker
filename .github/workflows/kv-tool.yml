name: KV Tool

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'get / delete / put / list'
        required: true
      key:
        description: 'KV key'
        required: false
        default: ''
      value:
        description: 'value (само за put)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  kv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run KV operation
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/74820d71c551391ce31d309c2fcb091c/storage/kv/namespaces/2900a1d9de0f49deac2359e558ba5783"
          A="${{ github.event.inputs.action }}"
          K=$(python3 -c "import urllib.parse;print(urllib.parse.quote('${{ github.event.inputs.key }}',safe=''))")
          R="kv-report.txt"
          echo "== KV $A ${{ github.event.inputs.key }} $(date -u) ==" > $R
          if [ "$A" = "account" ]; then
            echo "--- KV NAMESPACES ---" >> $R
            curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts/74820d71c551391ce31d309c2fcb091c/storage/kv/namespaces" >> $R
            echo "" >> $R
            echo "--- WORKERS ---" >> $R
            curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts/74820d71c551391ce31d309c2fcb091c/workers/scripts" | python3 -c "import json,sys; d=json.load(sys.stdin); print(json.dumps([{'id':x['id'],'modified':x.get('modified_on','')} for x in d.get('result',[])]))" >> $R
          elif [ "$A" = "listns" ]; then
            NS="${{ github.event.inputs.key }}"
            curl -s -H "Authorization: Bearer $CF_TOKEN" "https://api.cloudflare.com/client/v4/accounts/74820d71c551391ce31d309c2fcb091c/storage/kv/namespaces/$NS/keys?limit=1000" >> $R
          elif [ "$A" = "get" ]; then
            curl -s -H "Authorization: Bearer $CF_TOKEN" "$BASE/values/$K" >> $R
          elif [ "$A" = "delete" ]; then
            curl -s -X DELETE -H "Authorization: Bearer $CF_TOKEN" "$BASE/values/$K" >> $R
          elif [ "$A" = "put" ]; then
            curl -s -X PUT -H "Authorization: Bearer $CF_TOKEN" "$BASE/values/$K" --data '${{ github.event.inputs.value }}' >> $R
          elif [ "$A" = "list" ]; then
            curl -s -H "Authorization: Bearer $CF_TOKEN" "$BASE/keys?limit=100" >> $R
          fi
          echo "" >> $R
          git config user.name "ci"; git config user.email "ci@fish.taxi"
          git add $R && git commit -m "kv report [skip ci]" || true
          git push
